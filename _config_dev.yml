# Dev-only overrides, merged on top of _config.yml via `--config`.
# The jekyll-minifier plugin intermittently hits Errno::EINTR in this
# sandboxed preview env (interrupted syscalls during File.open on output).
# We don't need minification for dev previews anyway — drop it from the
# plugins list. Jekyll merges mappings, but arrays are replaced wholesale,
# so the full plugin list must be repeated here.
plugins:
  - jekyll-archives-v2
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  # - jekyll-minifier   # disabled for dev
  - jekyll-paginate-v2
  - jekyll-regex-replace
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-tabs
  - jekyll-terser
  - jekyll-toc
  - jekyll-twitter-plugin
